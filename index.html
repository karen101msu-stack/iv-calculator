<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IV Calculator - กุดหว้าสหคลินิก</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Sarabun', sans-serif; }
        .calculator-card { max-width: 600px; margin: 30px auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: none; }
        .btn-calculate { background: linear-gradient(45deg, #007bff, #0056b3); border: none; padding: 12px; font-weight: bold; }
        .result-box { display: none; border-radius: 15px; }
        .badge-custom { font-size: 0.9rem; padding: 8px 15px; border-radius: 50px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card calculator-card p-4">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Critical Care IV Calculator</h3>
            <span class="badge bg-danger badge-custom">⚠️ High-Alert Medications</span>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">เลือกรายการยา:</label>
            <select class="form-select" id="drugSelect" onchange="toggleMode()">
                <option value="phenytoin_load">Phenytoin (Loading Dose)</option>
                <option value="phenytoin_maint">Phenytoin (Maintenance Dose)</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">น้ำหนักผู้ป่วย (kg):</label>
            <input type="number" class="form-control form-control-lg" id="patientWeight" placeholder="กรอกน้ำหนัก...">
        </div>

        <div class="mb-4" id="doseSection">
            <label class="form-label fw-bold" id="doseLabel">ขนาดยา (mg/kg):</label>
            <select class="form-select form-select-lg" id="doseValue">
                </select>
        </div>

        <button class="btn btn-primary w-100 fs-5 btn-calculate shadow-sm" onclick="calculate()">คำนวณอัตราการให้ยา</button>

        <div id="resultSection" class="result-box mt-4 p-3 border bg-white shadow-sm">
            <div class="text-center">
                <p class="mb-1 text-muted fw-bold">ผลการคำนวณสำหรับ <span id="resMode" class="text-primary"></span></p>
                <h2 class="text-success fw-bold"><span id="totalDose"></span> mg</h2>
                <div id="rateInfo" class="mt-2"></div>
            </div>
            
            <div class="alert alert-warning mt-3 border-0" style="background-color: #fff9e6;">
                <h6 class="fw-bold"><i class="bi bi-exclamation-triangle"></i> ข้อมูลการบริหารยา:</h6>
                <ul class="mb-0 small" id="drugNotes"></ul>
            </div>
        </div>
    </div>
    <p class="text-center text-muted small">© 2026 กุดหว้าสหคลินิก - พัฒนาเพื่อสนับสนุนงานบริบาลทางเภสัชกรรม</p>
</div>

<script>
    // ฟังก์ชันเปลี่ยนตัวเลือกขนาดยาตามโหมดที่เลือก
    function toggleMode() {
        const mode = document.getElementById('drugSelect').value;
        const doseValue = document.getElementById('doseValue');
        const doseLabel = document.getElementById('doseLabel');
        
        doseValue.innerHTML = ""; // ล้างค่าเก่า
        
        if (mode === "phenytoin_load") {
            doseLabel.innerText = "ขนาดยา Loading (mg/kg):";
            const options = [15, 18, 20];
            options.forEach(opt => {
                doseValue.innerHTML += `<option value="${opt}">${opt} mg/kg</option>`;
            });
        } else {
            doseLabel.innerText = "ขนาดยา Maintenance (mg/kg/day):";
            const options = [4, 5, 6, 7];
            options.forEach(opt => {
                doseValue.innerHTML += `<option value="${opt}">${opt} mg/kg/day</option>`;
            });
        }
        // ซ่อนผลลัพธ์เก่าเมื่อเปลี่ยนโหมด
        document.getElementById('resultSection').style.display = 'none';
    }

    function calculate() {
        const mode = document.getElementById('drugSelect').value;
        const weight = parseFloat(document.getElementById('patientWeight').value);
        const dose = parseFloat(document.getElementById('doseValue').value);

        if (!weight || weight <= 0) {
            alert("กรุณากรอกน้ำหนักก่อนครับ");
            return;
        }

        const totalDose = weight * dose;
        let rateHtml = "";
        let notesHtml = "";

        if (mode === "phenytoin_load") {
            const minTime = Math.ceil(totalDose / 50);
            const nssVol = Math.ceil(totalDose / 10);
            document.getElementById('resMode').innerText = "Loading Dose";
            rateHtml = `<h5 class="text-danger fw-bold">ดริปขั้นต่ำ: ${minTime} นาที</h5>
                        <p class="small text-muted">ผสมใน NSS อย่างน้อย ${nssVol} mL</p>`;
            notesHtml = `<li>Fluid: <strong>NSS เท่านั้น</strong></li>
                         <li>Rate: ห้ามเกิน 50 mg/min</li>
                         <li>ต้องใช้ In-line filter (0.22-0.52 micron)</li>`;
        } else {
            document.getElementById('resMode').innerText = "Maintenance Dose";
            rateHtml = `<h5 class="text-info fw-bold">ขนาดยารวมต่อวัน</h5>
                        <p class="small text-muted">แบ่งให้วันละ 2-3 ครั้ง ตามดุลพินิจ</p>`;
            notesHtml = `<li>สามารถให้แบบ Oral หรือ IV Slow Push ได้</li>
                         <li>หากให้ IV: อัตราการฉีดห้ามเกิน 25-50 mg/min</li>
                         <li>ติดตามระดับยาในเลือด (Therapeutic Range: 10-20 mcg/mL)</li>`;
        }

        document.getElementById('totalDose').innerText = totalDose.toLocaleString();
        document.getElementById('rateInfo').innerHTML = rateHtml;
        document.getElementById('drugNotes').innerHTML = notesHtml;
        document.getElementById('resultSection').style.display = 'block';
    }

    // รันครั้งแรกเพื่อตั้งค่าเริ่มต้น
    toggleMode();
</script>
</body>
</html>
